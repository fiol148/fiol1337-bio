<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fiol1337 | Bio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #09050f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.7);
            width: 340px;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            /* ВСТАВЛЯЕМ АВАТАРКУ ЗДЕСЬ */
            background-image: url('avatar.png'); 
            background-size: cover; /* Чтобы картинка заполнила весь круг */
            background-position: center; /* Центрируем */
            background-repeat: no-repeat;
            margin-bottom: 20px;
            display: inline-block;
            border: 4px solid #bf40bf;
            box-shadow: 0 0 25px rgba(191, 64, 191, 0.6);
            position: relative;
        }
        
        .avatar::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            background: rgba(191, 64, 191, 0.2);
            z-index: -1;
            animation: pulse 2s infinite;
        }

        .username {
            font-size: 26px;
            letter-spacing: 2px;
            color: #e0aaff;
            text-shadow: 0 0 15px rgba(157, 78, 221, 1);
            text-transform: lowercase; /* Всегда маленькие */
            margin-bottom: 5px;
        }

        .sub-text {
            font-size: 16px;
            color: #b39ddb;
            opacity: 0.8;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            color: #f3e5f5;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            letter-spacing: 1px;
        }

        .link-card:hover {
            background: rgba(157, 78, 221, 0.25);
            border-color: #bf40bf;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 0 20px rgba(191, 64, 191, 0.7);
            color: #fff;
        }

        .status-msg {
            font-size: 13px;
            margin-top: 6px;
            color: #b39ddb;
            opacity: 0.8;
            transition: 0.3s;
        }

        #cursor {
            width: 12px;
            height: 12px;
            background-color: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #bf40bf, 0 0 20px #bf40bf;
        }

        #cursor-follower {
            width: 25px;
            height: 25px;
            border: 2px solid #bf40bf;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.1; }
            100% { transform: scale(1); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <div class="container">
        <div class="avatar"></div>
        <div class="username">fiol1337</div>
        <div class="sub-text">Bio</div>
        
        <div class="links">
            <a href="https://steamcommunity.com/profiles/76561199718307913/" target="_blank" class="link-card">
                Steam
            </a>

            <div class="link-card" onclick="copyDiscord()" id="discordBtn">
                Discord: fiol1337
            </div>
            <p class="status-msg" id="status">Click to copy username</p>
        </div>
    </div>

    <script>
        function copyDiscord() {
            const username = "fiol1337";
            navigator.clipboard.writeText(username).then(() => {
                const status = document.getElementById('status');
                status.innerText = "Copied!";
                status.style.color = "#00ff88";
                
                setTimeout(() => {
                    status.innerText = "Click to copy username";
                    status.style.color = "#b39ddb";
                }, 2000);
            });
        }

        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');

        document.addEventListener('mousemove', (e) => {
            const { clientX: x, clientY: y } = e;
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
            follower.style.left = x + 'px';
            follower.style.top = y + 'px';
            createParticle(x, y);
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            document.body.appendChild(particle);
            const size = Math.random() * 5 + 2;
            
            Object.assign(particle.style, {
                width: `${size}px`,
                height: `${size}px`,
                background: '#bf40bf',
                borderRadius: '50%',
                position: 'fixed',
                pointerEvents: 'none',
                left: `${x}px`,
                top: `${y}px`,
                boxShadow: '0 0 10px #bf40bf',
                zIndex: '9997'
            });

            const anim = particle.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*40}px, ${(Math.random()-0.5)*40}px) scale(0)`, opacity: 0 }
            ], { duration: 800, easing: 'ease-out' });

            anim.onfinish = () => particle.remove();
        }
    </script>
</body>
</html>
